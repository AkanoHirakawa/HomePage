<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>储物间 | Akano 赤野</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .storage-header {
            text-align: center;
            padding: 160px 40px 60px;
        }
        .storage-header h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--white), var(--orange-primary), var(--orange-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .storage-header p {
            color: var(--white-secondary);
            margin-top: 20px;
            font-size: 1.2rem;
        }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 0 40px 100px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .file-card {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 24px;
            border-radius: 18px;
            backdrop-filter: var(--blur-20);
            -webkit-backdrop-filter: var(--blur-20);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--white);
            cursor: pointer;
        }
        .file-card:hover {
            transform: translateY(-4px);
            border-color: var(--orange-primary);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.15);
        }
        .file-icon {
            font-size: 2.5rem;
            flex-shrink: 0;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255, 107, 53, 0.15);
        }
        .file-info h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .file-info span {
            font-size: 0.8rem;
            color: var(--white-tertiary);
        }
        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-top: 4px;
            background: rgba(255, 107, 53, 0.2);
            color: var(--orange-secondary);
        }
        .upload-section {
            text-align: center;
            padding: 20px 40px 80px;
            color: var(--white-tertiary);
            font-size: 0.9rem;
        }
        .upload-section a {
            color: var(--orange-primary);
        }
        @media (max-width: 768px) {
            .storage-header { padding: 120px 20px 40px; }
            .file-grid { padding: 0 20px 60px; grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-text">开锁中...</div>
    </div>

    <div class="starfield" id="starfield"></div>
    <div class="nebula"></div>
    <canvas class="constellation-canvas" id="constellationCanvas"></canvas>

    <nav class="navbar">
        <div class="logo">储物间</div>
        <ul class="nav-links" style="display:flex">
            <li><a href="../index.html" class="nav-link">← 返回主页</a></li>
        </ul>
    </nav>

    <div class="storage-header">
        <h1>我的储物间</h1>
        <p>文件、笔记、资源，都在这里</p>
    </div>

    <div class="file-grid" id="fileGrid"></div>

    <div class="upload-section">
        <p>💡 把文件放进 <code>storage/files/</code> 文件夹 → push 到 GitHub → 自动显示在这里</p>
    </div>

    <script src="../script.js"></script>
    <script>
    var TYPE_MAP = {
        pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', csv: '📊',
        ppt: '📽️', pptx: '📽️', txt: '📃', md: '📋', json: '📋', xml: '📋',
        png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', svg: '🖼️', webp: '🖼️', bmp: '🖼️',
        zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
        mp4: '🎬', avi: '🎬', mov: '🎬', mkv: '🎬', flv: '🎬',
        mp3: '🎵', wav: '🎵', flac: '🎵', aac: '🎵', ogg: '🎵',
        html: '🌐', css: '🎨', js: '📜', py: '🐍', cpp: '⚡', c: '⚡', java: '☕',
        exe: '⚙️', msi: '⚙️', apk: '📱', iso: '💿',
        psd: '🎨', ai: '🎨', dwg: '📐', stl: '📐',
        sch: '🔌', pcb: '🔌',
        other: '📎'
    };

    function getIcon(filename) {
        var ext = filename.split('.').pop().toLowerCase();
        return TYPE_MAP[ext] || TYPE_MAP.other;
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function renderFiles(files) {
        var grid = document.getElementById('fileGrid');
        grid.innerHTML = '';
        if (files.length === 0) {
            grid.innerHTML = '<p style="text-align:center;color:var(--white-tertiary);grid-column:1/-1;padding:60px">📭 储物间是空的，把文件放进 storage/files/ 文件夹</p>';
            return;
        }
        files.forEach(function (f) {
            var name = f.name;
            var downloadUrl = f.download_url || f.path;
            var size = f.size ? formatSize(f.size) : '';
            var icon = getIcon(name);
            var ext = name.split('.').pop().toUpperCase();
            var card = document.createElement('a');
            card.className = 'file-card';
            card.href = downloadUrl;
            card.target = '_blank';
            card.innerHTML =
                '<div class="file-icon">' + icon + '</div>' +
                '<div class="file-info">' +
                    '<h3>' + name + '</h3>' +
                    '<span>' + ext + ' 文件' + (size ? '  ·  ' + size : '') + '</span>' +
                '</div>';
            grid.appendChild(card);
        });
    }

    function fallbackLoad() {
        var manualList = [
            {
                name: 'SCH_Schematic1_2026-04-22.pdf',
                path: 'files/SCH_Schematic1_2026-04-22.pdf',
                size: null
            }
        ];
        renderFiles(manualList);
    }

    window.addEventListener('load', function () {
        var apiUrl = 'https://api.github.com/repos/AkanoHirakawa/HomePage/contents/storage/files';
        fetch(apiUrl)
            .then(function (res) {
                if (!res.ok) throw new Error('API failed');
                return res.json();
            })
            .then(function (data) {
                var files = [];
                data.forEach(function (item) {
                    if (item.name === '.gitkeep') return;
                    files.push({
                        name: item.name,
                        download_url: item.download_url,
                        path: item.path,
                        size: item.size
                    });
                });
                renderFiles(files);
            })
            .catch(function () {
                fallbackLoad();
            });
        setTimeout(function () {
            document.getElementById('loading').classList.add('fade-out');
        }, 800);
    });
    </script>
</body>
</html>
