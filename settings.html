<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 | Akano 赤野</title>
<link rel="stylesheet" href="style.css">
<script src="supabase-client.js"></script>
<script src="supabase.js"></script>
<style>
.settings-page { max-width: 700px; margin: 0 auto; padding: 140px 24px 60px; }
.settings-section { margin-bottom: 36px; }
.settings-section h3 { font-size: 1.1rem; margin-bottom: 16px; color: var(--white-secondary);
    border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
.avatar-area { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
.avatar-preview { width: 72px; height: 72px; border-radius: 50%; background: var(--glass-bg);
    border: 2px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; color: var(--white-tertiary); overflow: hidden; }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
.avatar-upload { font-size: 0.85rem; }
.avatar-upload label { cursor: pointer; color: var(--orange-primary); text-decoration: underline; }
.avatar-upload input[type=file] { display: none; }
.profile-field { display: flex; align-items: center; margin-bottom: 14px; gap: 12px; }
.profile-field .label { font-size: 0.85rem; color: var(--white-tertiary); min-width: 60px; }
.profile-field input,.profile-field textarea { flex: 1; padding: 10px 14px; border-radius: 10px;
    border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--white);
    font-size: 0.9rem; outline: none; font-family: inherit; resize: none; }
.profile-field input:focus,.profile-field textarea:focus { border-color: var(--orange-primary); }
.profile-field .static { flex: 1; font-size: 0.9rem; color: var(--white-secondary); }
.profile-field .member-badge { font-size: 1.4rem; font-weight: 700; color: var(--orange-primary);
    letter-spacing: 2px; font-family: monospace; }
.profile-field .days-badge { font-size: 0.9rem; color: var(--white-secondary); }
.save-btn { padding: 12px 36px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--orange-primary), var(--orange-secondary));
    color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
.save-btn:hover { opacity: 0.85; }
.mini-list { display: flex; flex-direction: column; gap: 8px; }
.mini-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
    border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); }
.mini-item .name { font-size: 0.9rem; color: var(--white); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mini-item button { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(200,60,60,0.3);
    background: var(--glass-bg); color: #f66; font-size: 0.8rem; cursor: pointer; }
.mini-item .public-switch { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--white); font-size: 0.8rem; cursor: pointer; margin-right: 6px; }
.auth-gate { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 25000;
    background: rgba(0,0,0,0.75); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.auth-gate.hidden { display: none; }
.auth-gate .gate-card { background: rgba(20,20,20,0.85); border: 1px solid var(--glass-border);
    border-radius: 24px; padding: 44px 40px; text-align: center; backdrop-filter: blur(30px); }
.auth-gate .gate-card h2 { font-size: 1.4rem; margin-bottom: 12px; }
.auth-gate .gate-card p { color: var(--white-tertiary); font-size: 0.9rem; margin-bottom: 24px; }
.auth-gate .gate-card a { display: inline-block; padding: 14px 36px; border-radius: 14px;
    background: linear-gradient(135deg, var(--orange-primary), var(--orange-secondary));
    color: #fff; text-decoration: none; font-weight: 600; }
@media (max-width: 768px) { .settings-page { padding: 120px 16px 30px; } }
</style>
</head>
<body>
<div class="auth-gate" id="authGate"><div class="gate-card">
    <h2>请先登录</h2><p>访问设置需要登录账户</p><a href="index.html">返回主页登录</a>
</div></div>
<div class="loading" id="loading"><div class="loading-text">加载设置...</div></div>
<div class="starfield" id="starfield"></div>
<div class="nebula"></div>
<canvas class="constellation-canvas" id="constellationCanvas"></canvas>
<nav class="navbar">
    <div class="logo">设置</div>
    <ul class="nav-links" style="display:flex">
        <li><a href="index.html" class="nav-link">返回主页</a></li>
    </ul>
    <a class="nav-user" id="navUserBtn" href="#">登录</a>
</nav>

<div class="settings-page" id="settingsPage">
    <div class="settings-section">
        <h3>个人资料</h3>
        <div class="avatar-area">
            <div class="avatar-preview" id="avatarPreview"></div>
            <div class="avatar-upload"><label for="avatarInput">更换头像</label><input type="file" id="avatarInput" accept="image/*" /></div>
        </div>
        <div class="profile-field"><span class="label">ID</span><span class="member-badge" id="memberId">-----</span></div>
        <div class="profile-field"><span class="label">昵称</span><input type="text" id="editNick" maxlength="20" /></div>
        <div class="profile-field"><span class="label">简介</span><textarea id="editBio" maxlength="50" rows="2"></textarea></div>
        <div class="profile-field"><span class="label">手机号</span><input type="tel" id="editPhone" /></div>
        <div class="profile-field"><span class="label">邮箱</span><span class="static" id="editEmail"></span></div>
        <div class="profile-field"><span class="label">注册日</span><span class="static" id="editCreated"></span></div>
        <div class="profile-field"><span class="days-badge" id="meetDays"></span></div>
        <button class="save-btn" id="saveProfile">保存资料</button>
    </div>
    <div class="settings-section">
        <h3>我的帖子</h3>
        <div class="mini-list" id="myPosts"></div>
    </div>
    <div class="settings-section">
        <h3>私人仓库</h3>
        <div class="mini-list" id="myFiles"></div>
    </div>
</div>

<script src="script.js"></script>
<script>
if(!isLogged()){document.getElementById('authGate').classList.remove('hidden');document.getElementById('settingsPage').style.display='none'}
else document.getElementById('authGate').classList.add('hidden');

function loadProfile(){
    getProfile().then(function(p){
        if(!p)return;
        var av=document.getElementById('avatarPreview');
        if(p.avatar_url)av.innerHTML='<img src="'+p.avatar_url+'" />';else av.textContent='?';
        document.getElementById('memberId').textContent=p.member_id||'-----';
        document.getElementById('editNick').value=p.nickname||'';
        document.getElementById('editBio').value=p.bio||'';
        document.getElementById('editPhone').value=p.phone||'';
        document.getElementById('editEmail').textContent=getSession().user.email;
        var d=new Date(p.created_at);
        document.getElementById('editCreated').textContent=d.toLocaleDateString('zh-CN');
        var days=Math.floor((Date.now()-d.getTime())/(86400000));
        document.getElementById('meetDays').textContent='遇见Akano的第 '+days+' 天';
    });
}
document.getElementById('saveProfile').addEventListener('click',function(){
    updateProfile({
        nickname:document.getElementById('editNick').value.trim(),
        bio:document.getElementById('editBio').value.trim().slice(0,50),
        phone:document.getElementById('editPhone').value.trim()
    }).then(function(){alert('保存成功')});
});
document.getElementById('avatarInput').addEventListener('change',function(){
    var f=this.files[0];if(!f)return;
    uploadAvatar(f).then(function(){loadProfile()});
});
function loadMyPosts(){
    var session=getSession();if(!session)return;
    var uid=session.user.id;
    supabase.from('forum_posts').select('*').eq('user_id',uid).order('created_at',{ascending:false}).then(function(r){
        var list=document.getElementById('myPosts');
        var posts=r.data||[];list.innerHTML='';
        if(posts.length===0){list.innerHTML='<p style="color:var(--white-tertiary);font-size:0.85rem">还没有帖子</p>';return}
        posts.forEach(function(p){
            var item=document.createElement('div');item.className='mini-item';
            item.innerHTML='<span class="name">'+p.title+'</span>'+
                '<div><button class="public-switch" data-id="'+p.id+'">'+(p.is_public?'论坛可见':'仅自己')+'</button>'+
                '<button class="del-post" data-id="'+p.id+'">删除</button></div>';
            list.appendChild(item);
        });
        list.querySelectorAll('.public-switch').forEach(function(b){b.addEventListener('click',function(){
            var id=b.dataset.id;var po=posts.find(function(x){return x.id==id});
            if(!po)return;updateForumPost(id,{is_public:!po.is_public}).then(function(){loadMyPosts()});
        })});
        list.querySelectorAll('.del-post').forEach(function(b){b.addEventListener('click',function(){
            if(!confirm('确认删除？'))return;deleteForumPost(b.dataset.id).then(function(){loadMyPosts()});
        })});
    });
}
function loadMyFiles(){
    var session=getSession();if(!session)return;
    listFiles(session.user.id).then(function(r){
        var list=document.getElementById('myFiles');
        var files=r.data||[];list.innerHTML='';
        if(files.length===0){list.innerHTML='<p style="color:var(--white-tertiary);font-size:0.85rem">还没有文件</p>';return}
        files.forEach(function(f){
            var item=document.createElement('div');item.className='mini-item';
            item.innerHTML='<span class="name">'+f.filename+'</span>'+
                '<div><button class="public-switch" data-id="'+f.id+'">'+(f.is_public?'公开':'私密')+'</button>'+
                '<button class="del-file" data-id="'+f.id+'" data-path="'+f.storage_path+'">删除</button></div>';
            list.appendChild(item);
        });
        list.querySelectorAll('.public-switch').forEach(function(b){b.addEventListener('click',function(){
            var id=b.dataset.id;var fi=files.find(function(x){return x.id==id});
            if(!fi)return;toggleFilePublic(id,!fi.is_public).then(function(){loadMyFiles()});
        })});
        list.querySelectorAll('.del-file').forEach(function(b){b.addEventListener('click',function(){
            if(!confirm('确认删除？'))return;deleteFile(b.dataset.id,b.dataset.path).then(function(){loadMyFiles()});
        })});
    });
}
loadProfile();loadMyPosts();loadMyFiles();
setTimeout(function(){document.getElementById('loading').classList.add('fade-out')},600);
</script>
</body>
</html>
